project:
  name: Azure Enterprise Security Intelligence Platform
  environment: local
  description: Local-first scaffold for Azure-aligned enterprise security analytics workflows.

azure_services_mapping:
  microsoft_sentinel: detection engineering and investigation workflows
  microsoft_entra_id: identity governance and access posture signals
  microsoft_defender_xdr: endpoint and incident context mapping
  azure_data_explorer: analytics query layer for future telemetry exploration
  azure_data_lake_storage: scalable storage pattern for raw and processed telemetry
  azure_machine_learning: future anomaly detection and risk scoring workflows
  azure_ai_foundry: future GenAI-assisted investigation copilot workflows
  azure_monitor: operational monitoring and evidence outputs
  power_bi: dashboard-ready reporting exports
  azure_key_vault: future secure secret and configuration management

input_datasets:
  future_expected:
    - sign_in_logs
    - audit_logs
    - endpoint_alerts
    - network_events
    - identity_inventory
    - privileged_role_assignments

output_paths:
  processed_data: data/processed
  monitoring_outputs: outputs
  investigation_reports: reports
  dashboard_exports: outputs/dashboard

telemetry_generation:
  default_days: 30
  default_users: 50
  default_seed: 42
  output_dir: data/raw
  expected_datasets:
    - identity_events.jsonl
    - login_events.jsonl
    - endpoint_events.jsonl
    - application_events.jsonl
    - security_alerts.jsonl
    - cloud_activity.jsonl

validation:
  input_dir: data/processed
  summary_path: outputs/data_quality_summary.json
  report_path: reports/data_quality_report.md
  allowed_severities:
    - low
    - medium
    - high
    - critical
  allowed_risk_hints:
    - normal
    - low
    - medium
    - high
    - critical

identity_governance:
  inactivity_days: 30
  role_sprawl_threshold: 2
  privileged_roles:
    - Global Administrator
    - Global Admin
    - Security Administrator
    - Security Operator
    - Privileged Role Administrator
    - Owner
    - Contributor
    - User Access Administrator
  risky_risk_hints:
    - medium
    - high
    - critical
    - elevated

risk_scoring:
  score_cap: 100
  risk_bands:
    low:
      min: 0
      max: 24
    medium:
      min: 25
      max: 49
    high:
      min: 50
      max: 74
    critical:
      min: 75
      max: 100
  severity_weights:
    critical: 30
    high: 20
    medium: 10
    low: 5
  governance_category_weights:
    mfa_gap: 15
    risky_privilege_assignment: 25
    privileged_cloud_activity: 25
    dormant_privileged_account: 20
    guest_exposure: 15
    role_sprawl: 10
    dormant_user: 5

monitoring:
  freshness_hours: 24
  data_quality_threshold: 90
  expected_outputs:
    - outputs/ingestion_summary.json
    - outputs/data_quality_summary.json
    - outputs/security_findings.json
    - outputs/identity_governance_findings.json
    - outputs/risk_scores.json
  evidence_reports:
    - reports/data_quality_report.md
    - reports/security_findings_report.md
    - reports/identity_governance_report.md
    - reports/risk_scoring_report.md
